version: '3.8'

services:
  backend:
    build: ./backend
    container_name: home-website-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: home-website-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
